<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Mis Finanzas"/>
<title>Mis Finanzas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh}
:root{--green:#1D9E75;--red:#D85A30;--blue:#378ADD;--teal:#0F6E56;--bg:#fff;--bg2:#f5f5f5;--border:#e0e0e0;--text:#111;--text2:#666;--card:#fff}
#app{max-width:430px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;position:relative}
#currency-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1.2rem}
.cur-logo{font-size:48px;margin-bottom:.5rem}
.cur-title{font-size:24px;font-weight:600;color:var(--text);text-align:center}
.cur-sub{font-size:14px;color:var(--text2);text-align:center}
.cur-btn{width:100%;padding:16px;border:1px solid var(--border);border-radius:14px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .15s}
.cur-btn:active{background:#f0f0f0}
.cur-flag{font-size:26px;width:36px;text-align:center}
.cur-name{font-size:16px;font-weight:600;color:var(--text);text-align:left}
.cur-code{font-size:12px;color:var(--text2);text-align:left}
#main-app{display:none;flex-direction:column;min-height:100vh}
.header{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.mnav{display:flex;align-items:center;gap:4px}
.mnav button{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:6px 8px;border-radius:8px}
.mnav button:active{background:#f0f0f0}
.mlabel{font-size:15px;font-weight:600;color:var(--text);min-width:110px;text-align:center}
.hright{display:flex;align-items:center;gap:8px}
.cbadge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;background:#e8f4ff;color:#1a5fa8;letter-spacing:.03em}
.close-btn{font-size:12px;padding:6px 12px;border-radius:10px;cursor:pointer;font-weight:600;border:1px solid var(--border);background:#fff;color:var(--text);white-space:nowrap}
.close-btn:active{background:#f0f0f0}
.close-btn.closed{background:#f5f5f5;color:#999;border-color:#e0e0e0}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:20px;padding:4px 6px;border-radius:8px}
.back-btn:active{background:#f0f0f0}
.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0;position:sticky;top:57px;z-index:9}
.tab{flex:1;padding:12px 2px;text-align:center;font-size:13px;font-weight:600;color:#999;cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;transition:all .15s}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.content{padding:16px;flex:1}
.scards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:16px}
.scard{background:var(--bg2);border-radius:12px;padding:14px}
.scard.full{grid-column:1/-1}
.sc-label{font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.sc-val{font-size:20px;font-weight:700;color:var(--text)}
.sc-val.green{color:var(--green)}.sc-val.red{color:var(--red)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.add-btn{display:flex;align-items:center;gap:4px;font-size:13px;font-weight:600;padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer}
.add-btn:active{background:#f0f0f0}
.tx{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.tx-ico{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;margin-top:1px}
.tx-ico.inc{background:#E1F5EE}.tx-ico.exp{background:#FAECE7}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:12px;color:var(--text2);margin-top:2px}
.tx-note{font-size:12px;color:var(--text2);margin-top:3px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.tx-amt{font-size:15px;font-weight:700;white-space:nowrap}
.tx-amt.inc{color:var(--green)}.tx-amt.exp{color:var(--red)}
.tx-acts{display:flex;gap:4px}
.tx-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;padding:4px;border-radius:6px}
.tx-btn:active{color:var(--text);background:#f0f0f0}
.recur-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:#E1F5EE;color:#0F6E56;font-weight:700}
.empty{text-align:center;padding:40px 16px;color:var(--text2);font-size:14px}
.banner{border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;display:flex;align-items:center;gap:8px;font-weight:500}
.banner.closed{background:#FFF8E7;color:#8a5c00;border:1px solid #f0d080}
.banner.recur{background:#E1F5EE;color:#085041;border:1px solid #9FE1CB}
.export-btn{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;margin-bottom:16px;width:100%;justify-content:center}
.export-btn:active{background:#f0f0f0}
.chart-wrap{margin-bottom:16px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px}
.chart-ttl{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);font-weight:500}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;z-index:100}
.modal-overlay.hidden{display:none}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 40px;width:100%;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--text)}
.fg{margin-bottom:14px}
.fg label{font-size:13px;color:var(--text2);margin-bottom:5px;display:block;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);font-size:15px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal)}
.fg textarea{resize:none;height:72px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid var(--border);gap:12px}
.toggle-label{font-size:14px;color:var(--text);font-weight:500;flex:1}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:24px;cursor:pointer;transition:.25s}
.toggle input:checked+.toggle-slider{background:var(--teal)}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px)}
.modal-acts{display:flex;gap:10px;margin-top:16px}
.btn-pri{flex:1;padding:14px;border:none;border-radius:12px;background:var(--teal);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
.btn-pri:active{opacity:.85}
.btn-sec{flex:1;padding:14px;border:1.5px solid var(--border);border-radius:12px;background:#fff;color:var(--text);font-size:16px;font-weight:600;cursor:pointer}
.btn-sec:active{background:#f0f0f0}
</style>
</head>
<body>
<div id="app">
<div id="currency-screen">
  <div class="cur-logo">💰</div>
  <div><div class="cur-title">Mis finanzas</div><div class="cur-sub" style="margin-top:6px">Elegí tu divisa</div></div>
  <button class="cur-btn" onclick="selectCur('ARS','$')"><div class="cur-flag">🇦🇷</div><div><div class="cur-name">Peso argentino</div><div class="cur-code">ARS — $</div></div></button>
  <button class="cur-btn" onclick="selectCur('USD','$')"><div class="cur-flag">🇺🇸</div><div><div class="cur-name">Dólar estadounidense</div><div class="cur-code">USD — $</div></div></button>
  <button class="cur-btn" onclick="selectCur('EUR','€')"><div class="cur-flag">🇪🇺</div><div><div class="cur-name">Euro</div><div class="cur-code">EUR — €</div></div></button>
</div>
<div id="main-app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:4px">
      <button class="back-btn" onclick="goBack()"><i class="ti ti-arrow-left"></i></button>
      <div class="mnav">
        <button onclick="prevMonth()"><i class="ti ti-chevron-left"></i></button>
        <span class="mlabel" id="mlabel"></span>
        <button onclick="nextMonth()" id="next-btn"><i class="ti ti-chevron-right"></i></button>
      </div>
    </div>
    <div class="hright">
      <span class="cbadge" id="cbadge">ARS</span>
      <button class="close-btn" id="close-btn" onclick="toggleClose()">Cerrar mes</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('ing')"><i class="ti ti-trending-up"></i> Ingresos</button>
    <button class="tab" onclick="showTab('egr')"><i class="ti ti-trending-down"></i> Egresos</button>
    <button class="tab" onclick="showTab('res')"><i class="ti ti-chart-pie"></i> Resumen</button>
  </div>
  <div class="content" id="content"></div>
</div>
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Nuevo ingreso</div>
    <div class="fg"><label>Descripción</label><input type="text" id="f-desc" placeholder="Ej: Sueldo de junio"/></div>
    <div class="fg"><label>Monto</label><input type="number" id="f-amount" placeholder="0.00" step="0.01" min="0" inputmode="decimal"/></div>
    <div class="fg"><label>Categoría</label><select id="f-cat"></select></div>
    <div class="fg"><label>Fecha</label><input type="date" id="f-date"/></div>
    <div class="fg"><label>Nota (opcional)</label><textarea id="f-note" placeholder="Agregá una nota..."></textarea></div>
    <div class="toggle-row" id="recur-row">
      <span class="toggle-label"><i class="ti ti-repeat" style="font-size:15px;vertical-align:-2px;margin-right:5px"></i>Ingreso recurrente (se carga cada mes)</span>
      <label class="toggle"><input type="checkbox" id="f-recur"><span class="toggle-slider"></span></label>
    </div>
    <div class="modal-acts">
      <button class="btn-sec" onclick="closeModal()">Cancelar</button>
      <button class="btn-pri" onclick="saveTx()">Guardar</button>
    </div>
  </div>
</div>
</div>
<script>
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const INC_CATS=['Sueldo','Freelance','Inversiones','Alquiler cobrado','Bono','Otros'];
const EXP_CATS=['Vivienda','Alimentación','Transporte','Salud','Entretenimiento','Servicios','Ropa','Educación','Otros'];
let cur='ARS',sym='$',activeTab='ing',editId=null,editType=null;
let cy=new Date().getFullYear(),cm=new Date().getMonth();
let charts=[];
function key(y,m){return 'fin_'+cur+'_'+y+'_'+m;}
function recurKey(){return 'fin_recur_'+cur;}
function getData(y,m){var r=localStorage.getItem(key(y,m));return r?JSON.parse(r):{incomes:[],expenses:[],closed:false};}
function saveData(y,m,d){localStorage.setItem(key(y,m),JSON.stringify(d));}
function getRecur(){var r=localStorage.getItem(recurKey());return r?JSON.parse(r):[];}
function saveRecur(r){localStorage.setItem(recurKey(),JSON.stringify(r));}
function fmt(n){return sym+parseFloat(n).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function selectCur(code,s){
  cur=code;sym=s;
  document.getElementById('cbadge').textContent=code;
  document.getElementById('currency-screen').style.display='none';
  document.getElementById('main-app').style.display='flex';
  var now=new Date();cy=now.getFullYear();cm=now.getMonth();
  applyRecurring();renderAll();
}
function goBack(){
  document.getElementById('main-app').style.display='none';
  document.getElementById('currency-screen').style.display='flex';
  destroyCharts();
}
function applyRecurring(){
  var recurs=getRecur();
  if(!recurs.length)return;
  var data=getData(cy,cm);
  var monthStr=cy+'-'+cm;
  recurs.forEach(function(r){
    var exists=data.incomes.some(function(i){return i.recurId===r.id&&i.recurMonth===monthStr;});
    if(!exists){
      data.incomes.push({id:Date.now().toString()+Math.random(),desc:r.desc,amount:r.amount,cat:r.cat,
        date:cy+'-'+String(cm+1).padStart(2,'0')+'-01',note:r.note||'',recur:true,recurId:r.id,recurMonth:monthStr});
    }
  });
  saveData(cy,cm,data);
}
function prevMonth(){cm--;if(cm<0){cm=11;cy--;}applyRecurring();renderAll();}
function nextMonth(){
  var now=new Date();
  if(cy<now.getFullYear()||(cy===now.getFullYear()&&cm<now.getMonth())){
    cm++;if(cm>11){cm=0;cy++;}applyRecurring();renderAll();
  }
}
function renderAll(){
  var data=getData(cy,cm);
  document.getElementById('mlabel').textContent=MONTHS[cm].substring(0,3)+' '+cy;
  var cb=document.getElementById('close-btn');
  cb.textContent=data.closed?'Reabrir mes':'Cerrar mes';
  cb.className=data.closed?'close-btn closed':'close-btn';
  var now=new Date();
  var nb=document.getElementById('next-btn');
  var canNext=cy<now.getFullYear()||(cy===now.getFullYear()&&cm<now.getMonth());
  nb.style.opacity=canNext?'1':'0.3';nb.style.pointerEvents=canNext?'auto':'none';
  showTab(activeTab,false);
}
function showTab(tab,updateActive){
  if(updateActive===undefined)updateActive=true;
  activeTab=tab;
  if(updateActive){
    var tabs=document.querySelectorAll('.tab');
    var names=['ing','egr','res'];
    tabs.forEach(function(t,i){t.classList.toggle('active',names[i]===tab);});
  }
  destroyCharts();
  var data=getData(cy,cm);
  var area=document.getElementById('content');
  if(tab==='ing')area.innerHTML=renderList(data,'income',data.closed);
  else if(tab==='egr')area.innerHTML=renderList(data,'expense',data.closed);
  else renderResumen(data,area);
}
function toggleClose(){
  var data=getData(cy,cm);data.closed=!data.closed;saveData(cy,cm,data);renderAll();
}
function renderList(data,type,closed){
  var list=type==='income'?data.incomes:data.expenses;
  var total=list.reduce(function(s,t){return s+parseFloat(t.amount);},0);
  var cls=type==='income'?'inc':'exp';
  var icon=type==='income'?'📈':'📉';
  var h='';
  if(closed)h+='<div class="banner closed"><i class="ti ti-lock"></i> Mes cerrado — podés ver y editar igual.</div>';
  var recurs=getRecur();
  if(type==='income'&&recurs.length)h+='<div class="banner recur"><i class="ti ti-repeat"></i> '+recurs.length+' ingreso'+(recurs.length>1?'s':'')+' recurrente'+(recurs.length>1?'s':'')+' activo'+(recurs.length>1?'s':'')+'.</div>';
  h+='<div class="scards"><div class="scard full"><div class="sc-label">Total '+(type==='income'?'ingresos':'egresos')+'</div><div class="sc-val '+(cls==='inc'?'green':'red')+'">'+fmt(total)+'</div></div></div>';
  h+='<div class="sec-hdr"><div class="sec-title">'+list.length+' movimiento'+(list.length!==1?'s':'')+'</div><button class="add-btn" onclick="openModal(\''+type+'\')"><i class="ti ti-plus"></i> Agregar</button></div>';
  if(!list.length)return h+'<div class="empty"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px"></i>Sin movimientos este mes</div>';
  var sorted=[].concat(list).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  sorted.forEach(function(tx){
    var d=new Date(tx.date+'T12:00:00');
    var ds=d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
    h+='<div class="tx"><div class="tx-ico '+cls+'">'+icon+'</div><div class="tx-info"><div class="tx-desc">'+esc(tx.desc)+'</div><div class="tx-meta">'+esc(tx.cat)+' · '+ds+(tx.recur?' <span class="recur-tag">recurrente</span>':'')+'</div>'+(tx.note?'<div class="tx-note">'+esc(tx.note)+'</div>':'')+'</div><div class="tx-right"><div class="tx-amt '+cls+'">'+fmt(tx.amount)+'</div><div class="tx-acts"><button class="tx-btn" onclick="openModal(\''+type+'\',\''+tx.id+'\')"><i class="ti ti-edit"></i></button><button class="tx-btn" onclick="deleteTx(\''+type+'\',\''+tx.id+'\')"><i class="ti ti-trash"></i></button></div></div></div>';
  });
  return h;
}
function renderResumen(data,area){
  var ti=data.incomes.reduce(function(s,t){return s+parseFloat(t.amount);},0);
  var te=data.expenses.reduce(function(s,t){return s+parseFloat(t.amount);},0);
  var diff=ti-te;
  var h='<button class="export-btn" onclick="exportXLS()"><i class="ti ti-download"></i> Exportar a Excel</button>';
  h+='<div class="scards"><div class="scard"><div class="sc-label">Ingresos</div><div class="sc-val green">'+fmt(ti)+'</div></div><div class="scard"><div class="sc-label">Egresos</div><div class="sc-val red">'+fmt(te)+'</div></div><div class="scard full"><div class="sc-label">Diferencia</div><div class="sc-val '+(diff>=0?'green':'red')+'">'+fmt(diff)+'</div></div></div>';
  h+='<div class="chart-wrap"><div class="chart-ttl">Distribución del mes</div><div class="legend"><span class="leg-item"><span class="leg-dot" style="background:#1D9E75"></span>Ingresos '+fmt(ti)+'</span><span class="leg-item"><span class="leg-dot" style="background:#D85A30"></span>Egresos '+fmt(te)+'</span>'+(diff>0?'<span class="leg-item"><span class="leg-dot" style="background:#378ADD"></span>Ahorro '+fmt(diff)+'</span>':'')+'</div><div style="position:relative;width:100%;height:220px"><canvas id="pie-c" role="img" aria-label="Torta del mes">.</canvas></div></div>';
  h+='<div class="chart-wrap"><div class="chart-ttl">Últimos 6 meses</div><div class="legend"><span class="leg-item"><span class="leg-dot" style="background:#5DCAA5"></span>Ingresos</span><span class="leg-item"><span class="leg-dot" style="background:#F0997B"></span>Egresos</span></div><div style="position:relative;width:100%;height:200px"><canvas id="bar-c" role="img" aria-label="Historial">.</canvas></div></div>';
  area.innerHTML=h;
  var pieData=ti===0&&te===0?{labels:['Sin datos'],datasets:[{data:[1],backgroundColor:['#ddd'],borderWidth:0}]}:diff>0?{labels:['Egresos','Ahorro'],datasets:[{data:[Math.round(te),Math.round(diff)],backgroundColor:['#D85A30','#378ADD'],borderWidth:0}]}:{labels:['Ingresos','Egresos'],datasets:[{data:[Math.round(ti),Math.round(te)],backgroundColor:['#1D9E75','#D85A30'],borderWidth:0}]};
  var pc=new Chart(document.getElementById('pie-c'),{type:'pie',data:pieData,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
  var hist=getHist(6);
  var bc=new Chart(document.getElementById('bar-c'),{type:'bar',data:{labels:hist.labels,datasets:[{label:'Ingresos',data:hist.inc,backgroundColor:'#5DCAA5',borderRadius:4},{label:'Egresos',data:hist.exp,backgroundColor:'#F0997B',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:11},color:'#888',autoSkip:false,maxRotation:0},grid:{display:false}},y:{ticks:{font:{size:10},color:'#888',callback:function(v){return sym+Math.round(v).toLocaleString('es-AR');}},grid:{color:'rgba(0,0,0,.06)'}}}}});
  charts=[{destroy:function(){pc.destroy();bc.destroy();}}];
}
function getHist(n){
  var labels=[],inc=[],exp=[];
  for(var i=n-1;i>=0;i--){
    var y=cy,m=cm-i;while(m<0){m+=12;y--;}
    var d=getData(y,m);
    labels.push(MONTHS[m].substring(0,3));
    inc.push(Math.round(d.incomes.reduce(function(s,t){return s+parseFloat(t.amount);},0)));
    exp.push(Math.round(d.expenses.reduce(function(s,t){return s+parseFloat(t.amount);},0)));
  }
  return{labels:labels,inc:inc,exp:exp};
}
function openModal(type,id){
  editType=type;editId=id||null;
  var data=getData(cy,cm);
  var list=type==='income'?data.incomes:data.expenses;
  var cats=type==='income'?INC_CATS:EXP_CATS;
  document.getElementById('modal-title').textContent=id?(type==='income'?'Editar ingreso':'Editar egreso'):(type==='income'?'Nuevo ingreso':'Nuevo egreso');
  var catSel=document.getElementById('f-cat');
  catSel.innerHTML=cats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('');
  document.getElementById('recur-row').style.display=type==='income'?'flex':'none';
  var today=new Date().toISOString().split('T')[0];
  if(id){
    var tx=list.find(function(t){return t.id===id;});
    if(tx){document.getElementById('f-desc').value=tx.desc;document.getElementById('f-amount').value=tx.amount;document.getElementById('f-date').value=tx.date;document.getElementById('f-note').value=tx.note||'';catSel.value=tx.cat;document.getElementById('f-recur').checked=!!tx.recur;}
  } else {
    document.getElementById('f-desc').value='';document.getElementById('f-amount').value='';document.getElementById('f-date').value=today;document.getElementById('f-note').value='';catSel.value=cats[0];document.getElementById('f-recur').checked=false;
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');editId=null;editType=null;}
function saveTx(){
  var desc=document.getElementById('f-desc').value.trim();
  var amount=parseFloat(document.getElementById('f-amount').value);
  var cat=document.getElementById('f-cat').value;
  var date=document.getElementById('f-date').value;
  var note=document.getElementById('f-note').value.trim();
  var recur=editType==='income'&&document.getElementById('f-recur').checked;
  if(!desc||isNaN(amount)||amount<=0||!date)return;
  var data=getData(cy,cm);
  var list=editType==='income'?data.incomes:data.expenses;
  if(editId){
    var idx=list.findIndex(function(t){return t.id===editId;});
    if(idx!==-1)list[idx]=Object.assign({},list[idx],{desc:desc,amount:amount,cat:cat,date:date,note:note,recur:recur});
  } else {
    var id=Date.now().toString();
    var tx={id:id,desc:desc,amount:amount,cat:cat,date:date,note:note,recur:recur};
    if(recur){
      var recurs=getRecur();
      var recurId='r'+Date.now();
      recurs.push({id:recurId,desc:desc,amount:amount,cat:cat,note:note});
      saveRecur(recurs);
      tx.recurId=recurId;
      tx.recurMonth=cy+'-'+cm;
    }
    list.push(tx);
  }
  saveData(cy,cm,data);closeModal();showTab(activeTab);
}
function deleteTx(type,id){
  var data=getData(cy,cm);
  var list=type==='income'?data.incomes:data.expenses;
  var tx=list.find(function(t){return t.id===id;});
  if(tx&&tx.recurId&&confirm('¿Eliminar también el ingreso recurrente?')){
    saveRecur(getRecur().filter(function(r){return r.id!==tx.recurId;}));
  }
  if(type==='income')data.incomes=data.incomes.filter(function(t){return t.id!==id;});
  else data.expenses=data.expenses.filter(function(t){return t.id!==id;});
  saveData(cy,cm,data);showTab(activeTab);
}
function exportXLS(){
  var data=getData(cy,cm);
  var rows=[['Tipo','Descripción','Categoría','Fecha','Nota','Monto','Recurrente']];
  data.incomes.forEach(function(t){rows.push(['Ingreso',t.desc,t.cat,t.date,t.note||'',parseFloat(t.amount),t.recur?'Sí':'No']);});
  data.expenses.forEach(function(t){rows.push(['Egreso',t.desc,t.cat,t.date,t.note||'',parseFloat(t.amount),'No']);});
  var ti=data.incomes.reduce(function(s,t){return s+parseFloat(t.amount);},0);
  var te=data.expenses.reduce(function(s,t){return s+parseFloat(t.amount);},0);
  rows.push([],[' ',' ',' ',' ',' ','Total ingresos:',ti],[' ',' ',' ',' ',' ','Total egresos:',te],[' ',' ',' ',' ',' ','Diferencia:',ti-te]);
  var ws=XLSX.utils.aoa_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,MONTHS[cm]+' '+cy);
  XLSX.writeFile(wb,'finanzas_'+cur+'_'+MONTHS[cm]+'_'+cy+'.xlsx');
}
function destroyCharts(){charts.forEach(function(c){c.destroy();});charts=[];}
</script>
